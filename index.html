<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v5.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0b0e;
  color:white;
  display:flex;
  justify-content:center;
}

.app{
  width:92%;
  max-width:420px;
  padding-top:40px;
}

.screen{display:none;}
.active{display:block;animation:fade .2s ease;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* większy UI */
h1{font-size:34px;}
h2{font-size:24px;}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  margin-top:15px;
  text-align:center;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  border:none;
  background:white;
  color:black;
  font-weight:700;
  font-size:15px;
}

.card{
  padding:18px;
  margin-top:12px;
  border-radius:16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  font-size:15px;
}

.top{
  font-size:13px;
  opacity:.7;
  margin-bottom:15px;
}

/* achievements */
.ach{
  margin-top:12px;
  padding:14px;
  border-radius:14px;
  background:rgba(255,215,0,0.08);
  border:1px solid rgba(255,215,0,0.2);
  font-size:14px;
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ ForgeFit</h1>

  <input id="name" placeholder="Twój nick" />
  <button onclick="start()">Start</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="top" id="profile"></div>

  <h2>Menu</h2>

  <div class="card" onclick="train()">🏋️ Trening</div>
  <div class="card" onclick="diet()">🥗 Dieta</div>

  <div class="ach" id="achBox">🏆 Osiągnięcia: brak</div>

  <button onclick="addXP()">Symuluj trening (+XP)</button>
  <button onclick="reset()">Reset</button>
</div>

<!-- TRAIN -->
<div id="train" class="screen">
  <h2>Trening</h2>
  <div id="t"></div>
  <button onclick="completeTrain()">Zakończ trening</button>
  <button onclick="back()">Back</button>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <h2>Dieta</h2>
  <div id="d"></div>
  <button onclick="back()">Back</button>
</div>

</div>

<script>

let user="";
let xp=0;
let streak=1;
let trainings=0;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  save();
}

function start(){
  user=document.getElementById("name").value||"Athlete";
  load();
  update();
  show("menu");
}

function load(){
  xp=Number(localStorage.getItem("xp")||0);
  streak=Number(localStorage.getItem("streak")||1);
  trainings=Number(localStorage.getItem("trainings")||0);
}

function update(){

  let rank="Rekrut";
  if(xp>=100) rank="Adept";
  if(xp>=300) rank="Wojownik";
  if(xp>=600) rank="Weteran";
  if(xp>=1000) rank="LEGEND";

  document.getElementById("profile").innerText=
  `${user} | XP: ${xp} | Ranga: ${rank} | 🔥 ${streak} dni`;

  updateAchievements();
}

function updateAchievements(){

  let a="";

  if(trainings>=1) a+="🔥 Pierwsze uderzenie\n";
  if(trainings>=10) a+="💪 Hartowanie ciała\n";
  if(xp>=100) a+="⚡ Adept Forge\n";
  if(streak>=7) a+="🧠 Żelazna dyscyplina\n";

  document.getElementById("achBox").innerText=
  a || "🏆 Osiągnięcia: brak";
}

function train(){
  document.getElementById("t").innerText=
  "Pompki\nPodciąganie\nPrzysiady";
  show("train");
}

function diet(){
  document.getElementById("d").innerText=
  "Białko\nWęgle\nWoda\nWarzywa";
  show("diet");
}

function completeTrain(){
  xp+=30;
  streak+=1;
  trainings+=1;
  save();
  update();
  show("menu");
}

function addXP(){
  xp+=10;
  save();
  update();
}

function back(){
  show("menu");
}

function reset(){
  xp=0;
  streak=1;
  trainings=0;
  save();
  update();
  show("menu");
}

function save(){
  localStorage.setItem("xp",xp);
  localStorage.setItem("streak",streak);
  localStorage.setItem("trainings",trainings);
}

</script>

</body>
</html>
