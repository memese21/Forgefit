<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v2.0</title>

<style>
body{
  margin:0;
  font-family: system-ui, Arial;
  background:#0e0f12;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* container */
.app{
  width:92%;
  max-width:420px;
}

/* screens */
.screen{display:none; animation:fade .25s ease;}
.active{display:block;}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* header */
h1{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:5px;
}
.sub{
  opacity:.6;
  font-size:13px;
  margin-bottom:20px;
}

/* input */
input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  text-align:center;
  margin-top:10px;
}

/* buttons */
button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  background:white;
  color:black;
  font-weight:600;
  cursor:pointer;
}

/* cards */
.card{
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  transition:.2s;
}
.card:hover{
  transform:scale(1.02);
  background:rgba(255,255,255,0.08);
}

/* top bar */
.top{
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}

/* plan box */
.plan{
  white-space:pre-line;
  font-size:14px;
  line-height:1.5;
  padding:14px;
  background:rgba(255,255,255,0.04);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ ForgeFit</h1>
  <div class="sub">Build yourself. One rep at a time.</div>

  <input id="name" placeholder="Twój nick" />

  <button onclick="goGoal()">Start</button>
</div>

<!-- GOAL -->
<div id="goal" class="screen">
  <div class="top" id="userTop"></div>

  <h2>Twój cel</h2>

  <div class="card" onclick="setGoal('masa')">💪 Masa mięśniowa</div>
  <div class="card" onclick="setGoal('redukcja')">🔥 Redukcja</div>
  <div class="card" onclick="setGoal('sila')">⚡ Siła</div>
  <div class="card" onclick="setGoal('kalis')">🤸 Kalistenika</div>

  <button onclick="goPlan()">Generuj plan</button>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
  <div class="top" id="userTop2"></div>

  <h2>Twój plan</h2>

  <div class="plan" id="output"></div>

  <button onclick="restart()">Reset</button>
</div>

</div>

<script>

let user="";
let goal="";

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goGoal(){
  user=document.getElementById("name").value||"Athlete";
  document.getElementById("userTop").innerText="Logged as: "+user;
  show("goal");
}

function setGoal(g){
  goal=g;
}

function goPlan(){
  document.getElementById("userTop2").innerText="User: "+user;

  let plan="";

  if(goal==="masa"){
    plan=
`Dzień 1 - Push
• Pompki 4x max
• Dipy 3x max
• Wyciskanie 4x8

Dzień 2 - Pull
• Podciąganie 4x max
• Wiosłowanie 4x10

Dzień 3 - Legs
• Przysiady 4x12
• Wykroki 3x10`;
  }

  if(goal==="redukcja"){
    plan=
`Cardio + spalanie
• Bieg 25 min
• Pompki 3x max
• Brzuch 4 serie
• 8-12k kroków`;
  }

  if(goal==="sila"){
    plan=
`Siła
• Pompki wolne 5x5
• Podciąganie 5x max
• Dipy 4x6
• Długie przerwy`;
  }

  if(goal==="kalis"){
    plan=
`Kalistenika
• Handstand practice
• Pompki 4x max
• Core training
• Mobility`;
  }

  document.getElementById("output").innerText=plan;

  show("plan");
}

function restart(){
  show("start");
}

</script>

</body>
</html>
