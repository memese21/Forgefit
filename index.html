<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v3.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0c0d10;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.app{width:92%;max-width:420px;}

.screen{display:none;animation:fade .25s ease;}
.active{display:block;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

h1{font-size:28px;letter-spacing:2px;}

.sub{opacity:.6;font-size:13px;margin-bottom:15px;}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  text-align:center;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:white;
  color:black;
  font-weight:600;
}

.card{
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}

.card:hover{background:rgba(255,255,255,0.1);}

.top{font-size:12px;opacity:.6;margin-bottom:10px;}

.menu{
  display:grid;
  gap:10px;
}

.box{
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ ForgeFit</h1>
  <div class="sub">Build yourself. No excuses.</div>

  <input id="name" placeholder="Twój nick" />
  <button onclick="toGoal()">Start</button>
</div>

<!-- GOAL -->
<div id="goal" class="screen">
  <div class="top" id="user"></div>

  <h2>Wybierz cel</h2>

  <div class="card" onclick="setGoal('masa')">💪 Masa</div>
  <div class="card" onclick="setGoal('redukcja')">🔥 Redukcja</div>
  <div class="card" onclick="setGoal('sila')">⚡ Siła</div>
  <div class="card" onclick="setGoal('kalis')">🤸 Kalistenika</div>

  <button onclick="toMenu()">Dalej</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="top" id="user2"></div>

  <h2>Menu</h2>

  <div class="menu">

    <div class="box" onclick="showTraining()">🏋️ Trening</div>
    <div class="box" onclick="showDiet()">🥗 Dieta</div>
    <div class="box">📊 Plan tygodnia (soon)</div>
    <div class="box">⚙️ Profil (soon)</div>

  </div>

  <button onclick="restart()">Reset</button>
</div>

<!-- TRAINING -->
<div id="training" class="screen">
  <h2>Trening</h2>
  <div id="plan"></div>
  <button onclick="back()">Powrót</button>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <h2>Dieta</h2>
  <div id="dietPlan"></div>
  <button onclick="back()">Powrót</button>
</div>

</div>

<script>

let user="";
let goal="";

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function toGoal(){
  user=document.getElementById("name").value||"Athlete";
  document.getElementById("user").innerText="User: "+user;
  show("goal");
}

function setGoal(g){
  goal=g;
}

function toMenu(){
  document.getElementById("user2").innerText="User: "+user;
  show("menu");
}

/* TRAINING */
function showTraining(){
  let t="";

  if(goal==="masa"){
    t="Push/Pull/Legs\nPompki 4x max\nPodciąganie 4x max\nPrzysiady 4x12";
  }

  if(goal==="redukcja"){
    t="Cardio + siła\nBieg 25 min\nPompki 3x max\nBrzuch 4 serie";
  }

  if(goal==="sila"){
    t="Siła\nPompki 5x5\nDipy 4x6\nPodciąganie max";
  }

  if(goal==="kalis"){
    t="Kalistenika\nHandstand\nCore\nMobilność";
  }

  document.getElementById("plan").innerText=t;
  show("training");
}

/* DIET */
function showDiet(){
  let d="";

  if(goal==="masa"){
    d="Dieta na masę:\n+ kalorie\n+ białko\nryż, mięso, jajka";
  }

  if(goal==="redukcja"){
    d="Dieta redukcja:\n- kalorie\nbiałko wysokie\nwarzywa + mięso";
  }

  if(goal==="sila"){
    d="Dieta siła:\nzbilansowana\nbiałko + węgle\nregeneracja";
  }

  if(goal==="kalis"){
    d="Dieta kalistenika:\nlekka\nbiałko\nmobilność";
  }

  document.getElementById("dietPlan").innerText=d;
  show("diet");
}

function back(){
  show("menu");
}

function restart(){
  show("start");
}

</script>

</body>
</html>
