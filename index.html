<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v4.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0c10;
  color:white;
  display:flex;
  justify-content:center;
  min-height:100vh;
}

.app{width:92%;max-width:420px;}

.screen{display:none;}
.active{display:block;animation:fade .2s ease;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

h1{font-size:28px;}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:600;
  background:white;
  color:black;
}

.card{
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}

.top{
  font-size:12px;
  opacity:.7;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ ForgeFit</h1>

  <input id="name" placeholder="Nick" />
  <button onclick="start()">Start</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="top" id="profile"></div>

  <h2>Menu</h2>

  <div class="card" onclick="train()">🏋️ Trening</div>
  <div class="card" onclick="diet()">🥗 Dieta</div>

  <button onclick="reset()">Reset</button>
</div>

<!-- TRAIN -->
<div id="train" class="screen">
  <h2>Trening</h2>
  <div id="t"></div>
  <button onclick="addXP(30)">Zakończ trening (+30 XP)</button>
  <button onclick="back()">Back</button>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <h2>Dieta</h2>
  <div id="d"></div>
  <button onclick="back()">Back</button>
</div>

</div>

<script>

let user="";
let xp=0;
let streak=1;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  save();
}

function start(){
  user=document.getElementById("name").value||"Athlete";

  xp = Number(localStorage.getItem("xp")||0);
  streak = Number(localStorage.getItem("streak")||1);

  showMenu();
}

function showMenu(){
  updateProfile();
  show("menu");
}

function updateProfile(){

  let rank="Rekrut";

  if(xp>=100) rank="Adept";
  if(xp>=300) rank="Wojownik";
  if(xp>=600) rank="Weteran";
  if(xp>=1000) rank="LEGEND";

  document.getElementById("profile").innerText =
  `${user} | XP: ${xp} | Ranga: ${rank} | 🔥 ${streak} dni`;
}

function train(){
  document.getElementById("t").innerText=
  "Pompki 4x max\nPodciąganie 4x max\nPrzysiady 4x12";
  show("train");
}

function diet(){
  document.getElementById("d").innerText=
  "Jedz czysto\nBiałko\nWęgle\nWoda";
  show("diet");
}

function addXP(val){
  xp+=val;
  streak+=1;
  updateProfile();
  showMenu();
}

function back(){
  showMenu();
}

function reset(){
  xp=0;
  streak=1;
  save();
  showMenu();
}

function save(){
  localStorage.setItem("xp",xp);
  localStorage.setItem("streak",streak);
}

</script>

</body>
</html>
