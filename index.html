<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v1.0</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #151515, #070707);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* layout */
.screen {
  display: none;
  width: 90%;
  max-width: 420px;
  text-align: center;
  animation: fade 0.4s ease;
}

.active {
  display: block;
}

/* animations */
@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* typography */
h1 {
  font-size: 32px;
  letter-spacing: 3px;
  margin-bottom: 5px;
}

.subtitle {
  opacity: 0.6;
  font-size: 13px;
  margin-bottom: 20px;
}

/* input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  text-align: center;
  outline: none;
}

/* buttons */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.97);
}

/* tiles */
.tile {
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.tile:hover {
  background: rgba(255,255,255,0.1);
}

/* header bar */
.topbar {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ FORGEFIT</h1>
  <div class="subtitle">Każdy mistrz był kiedyś początkującym</div>

  <input id="name" placeholder="Wpisz nick lub imię" />

  <button onclick="go('goal')">Rozpocznij</button>
</div>

<!-- GOAL -->
<div id="goal" class="screen">
  <div class="topbar" id="userLabel"></div>

  <h2>Jaki masz cel?</h2>

  <div class="tile" onclick="setGoal('masa')">💪 Masa mięśniowa</div>
  <div class="tile" onclick="setGoal('redukcja')">🔥 Redukcja</div>
  <div class="tile" onclick="setGoal('sila')">⚡ Siła</div>
  <div class="tile" onclick="setGoal('kalis')">🤸 Kalistenika</div>

  <button onclick="go('plan')">Dalej</button>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
  <div class="topbar" id="userLabel2"></div>

  <h2>Twój plan ⚒️</h2>

  <div id="output"></div>

  <button onclick="go('start')">Restart</button>
</div>

<script>

let user = "";
let goal = "";

function go(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");

  if (screen === "goal") {
    user = document.getElementById("name").value || "Athlete";

    document.getElementById("userLabel").innerText =
      "⚒️ Witaj " + user;

  }

  if (screen === "plan") {
    document.getElementById("userLabel2").innerText =
      "⚒️ " + user;

    generatePlan();
  }
}

function setGoal(g) {
  goal = g;
}

function generatePlan() {
  let plan = "";

  if (goal === "masa") {
    plan = `
Dzień 1: Klatka + triceps
- Pompki 4x max
- Dipy 3x max
- Wyciskanie 4x8

Dzień 2: Plecy
- Podciąganie 4x max
- Wiosłowanie 4x10
- Core 3x

Dzień 3: Nogi
- Przysiady 4x12
- Wykroki 3x10
- Brzuch 3x
`;
  }

  if (goal === "redukcja") {
    plan = `
Cardio + spalanie
- Bieg 20-30 min
- Pompki 3x max
- Brzuch 4 serie
- 8-12k kroków dziennie
`;
  }

  if (goal === "sila") {
    plan = `
Siła
- Pompki wolne 5x5
- Podciąganie 5x max
- Dipy 4x6
- Przerwy 2-3 min
`;
  }

  if (goal === "kalis") {
    plan = `
Kalistenika
- Handstand practice
- Pompki 4x max
- Core training
- Mobilność
`;
  }

  document.getElementById("output").innerText = plan;
}

</script>

</body>
</html>
