<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v8.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#08090c;
  color:white;
  display:flex;
  justify-content:center;
}

.app{
  width:92%;
  max-width:420px;
  padding-top:30px;
}

.screen{display:none;}
.active{display:block;animation:fade .25s ease;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

h1{font-size:32px;}
h2{font-size:22px;}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  text-align:center;
  margin-top:15px;
}

button{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  margin-top:12px;
  font-weight:700;
  background:white;
  color:black;
}

.card{
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
}

.premium{
  opacity:.35;
  border:1px dashed rgba(255,255,255,0.25);
}

.top{
  font-size:13px;
  opacity:.7;
  margin-bottom:12px;
}

.profileBox{
  padding:16px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ ForgeFit</h1>
  <input id="name" placeholder="Nick" />
  <button onclick="start()">Start</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="top" id="top"></div>

  <h2>Menu</h2>

  <div class="card" onclick="train()">🏋️ Trening</div>
  <div class="card" onclick="diet()">🥗 Dieta</div>
  <div class="card" onclick="daily()">📅 Daily Quest</div>
  <div class="card premium">💎 Premium (soon)</div>
  <div class="card" onclick="profile()">👤 Profil</div>

  <button onclick="completeTrain()">+ XP</button>
</div>

<!-- TRAIN -->
<div id="train" class="screen">
  <h2>Trening</h2>
  <div id="t"></div>
  <button onclick="completeTrain()">Zakończ</button>
  <button onclick="back()">Back</button>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <h2>Dieta</h2>
  <div id="d"></div>
  <button onclick="back()">Back</button>
</div>

<!-- DAILY -->
<div id="daily" class="screen">
  <h2>Daily Quest</h2>
  <div class="card" id="quest"></div>
  <button onclick="completeDaily()">Wykonane</button>
  <button onclick="back()">Back</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h2>Profil</h2>

  <div class="profileBox" id="pbox"></div>

  <button onclick="back()">Back</button>
</div>

</div>

<script>

let user="";
let xp=0;
let streak=1;
let trainings=0;
let dailyDone=0;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  save();
}

function start(){
  user=document.getElementById("name").value||"Athlete";
  load();
  update();
  show("menu");
  generateQuest();
}

function load(){
  xp=Number(localStorage.getItem("xp")||0);
  streak=Number(localStorage.getItem("streak")||1);
  trainings=Number(localStorage.getItem("trainings")||0);
  dailyDone=Number(localStorage.getItem("daily")||0);
}

function level(){
  if(xp>=1000) return 5;
  if(xp>=500) return 4;
  if(xp>=250) return 3;
  if(xp>=100) return 2;
  return 1;
}

function update(){
  document.getElementById("top").innerText=
  `${user} | XP: ${xp} | Level: ${level()} | 🔥 ${streak}`;
}

/* TRAIN */
function train(){
  document.getElementById("t").innerText=
  "Pompki\nPodciąganie\nPrzysiady";
  show("train");
}

function diet(){
  document.getElementById("d").innerText=
  "Białko\nWęgle\nWarzywa";
  show("diet");
}

/* DAILY */
let quest="";
function generateQuest(){
  let q=[
    "🔥 50 pompek",
    "🏃 15 min cardio",
    "🤸 mobilność",
    "🧠 core"
  ];
  quest=q[Math.floor(Math.random()*q.length)];
  document.getElementById("quest").innerText=quest;
}

function daily(){
  generateQuest();
  show("daily");
}

function completeDaily(){
  xp+=50;
  streak+=1;
  dailyDone+=1;
  save();
  update();
  show("menu");
}

/* PROFILE */
function profile(){

  let status = streak>0 ? "ACTIVE 🔥" : "INACTIVE";

  document.getElementById("pbox").innerText=
`
Nick: ${user}
XP: ${xp}
Level: ${level()}
Treningi: ${trainings}
Daily done: ${dailyDone}
Status: ${status}
`;

  show("profile");
}

/* XP */
function completeTrain(){
  xp+=30;
  streak+=1;
  trainings+=1;
  save();
  update();
  show("menu");
}

function back(){
  show("menu");
}

function save(){
  localStorage.setItem("xp",xp);
  localStorage.setItem("streak",streak);
  localStorage.setItem("trainings",trainings);
  localStorage.setItem("daily",dailyDone);
}

</script>

</body>
</html>
