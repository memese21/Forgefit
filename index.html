<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ForgeFit v12.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#07080b;
  color:white;
  display:flex;
  justify-content:center;
}

.app{
  width:92%;
  max-width:420px;
  padding-top:30px;
}

.screen{display:none;}
.active{display:block;animation:fade .25s ease;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

h1{font-size:32px;}
h2{font-size:22px;}

input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  text-align:center;
  margin-top:15px;
}

button{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:none;
  margin-top:12px;
  font-weight:700;
  background:white;
  color:black;
}

.card{
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
}

.leader{
  padding:14px;
  border-radius:14px;
  background:rgba(0,255,150,0.08);
  border:1px solid rgba(0,255,150,0.2);
  margin-top:10px;
}

.top{
  font-size:13px;
  opacity:.7;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="app">

<!-- START -->
<div id="start" class="screen active">
  <h1>⚒️ ForgeFit</h1>
  <input id="name" placeholder="Nick" />
  <button onclick="start()">Start</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <div class="top" id="top"></div>

  <h2>Leaderboard</h2>

  <div class="leader" id="board"></div>

  <button onclick="train()">Trening</button>
</div>

<!-- TRAIN -->
<div id="train" class="screen">
  <h2>Trening</h2>
  <div class="card">Pompki / Pull / Legs</div>

  <button onclick="complete()">Zakończ trening</button>
  <button onclick="back()">Back</button>
</div>

</div>

<script>

let user="";
let xp=0;
let streak=1;

let fakeUsers=[
  {name:"Alex",xp:820},
  {name:"Mike",xp:540}
];

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function start(){
  user=document.getElementById("name").value||"You";
  load();
  update();
  show("menu");
}

function leaderboard(){

  let all=[...fakeUsers,{name:user,xp:xp}];

  all.sort((a,b)=>b.xp-a.xp);

  let text="";

  all.forEach((u,i)=>{
    let tag = u.name===user ? "👤 YOU" : "";
    text+=`${i+1}. ${u.name} - ${u.xp} XP ${tag}\n`;
  });

  document.getElementById("board").innerText=text;

}

function update(){
  document.getElementById("top").innerText=
  `${user} | XP: ${xp} | 🔥 ${streak}`;

  leaderboard();
}

function train(){
  show("train");
}

function complete(){
  xp+=40;
  streak+=1;

  update();

  show("menu");
}

function back(){
  show("menu");
}

function load(){
  xp=Number(localStorage.getItem("xp")||0);
  streak=Number(localStorage.getItem("streak")||1);
}

</script>

</body>
</html>
